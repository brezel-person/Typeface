<head>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="blue-page">
    
    <div class="right-button">
        <button id="home_btn" class="pink-button">Leave Quiz</button>
    </div>
    <h1 class="article">What could YOU crochet?</h1>
    <br>
    <div class="container pink-page">
        <div id="question1">
            <br>
            <h1 class="q"> What's your crochet level? </h1>
            <br><br>
            <div class="center-button">
                <button id="beginnerBtn" class="qBtn">Beginner!</button>
                <button id="intermBtn" class="qBtn">Intermediate!</button>
                <br><br>
                <button id="advBtn" class="qBtn">Advanced!</button>
                <br><br><br>
            </div>
        </div>
        <div id="question2" style="display:none">
            <br>
            <h1 class="q"> Do you wanna crochet something... </h1>
            <br><br>
            <div class="center-button">
                <button id="cuteBtn" class="qBtn">Cute!</button>
                <button id="spookyBtn" class="qBtn">Spooky!</button>
                <br><br>
                <button id="bothBtn" class="qBtn">Both cute and spooky!</button>
                <br><br><br>
            </div>
        </div>
        <div id="projResults" style="display:none">
            <h1 class="q"> Your project is...</h1>
            <br>
            <h1 class="q">...</h1>
            <br><br><br>
            <h3 id="projectName" class="project"></h3>
            <br>
            <p id="projectDesc" class="project"></p>
            <br><br>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
